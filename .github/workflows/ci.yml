name: Omni_Craft Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GRADLE_VERSION:   "9.5.1"
  NDK_VERSION:      "29.0.14206865"
  CMAKE_VERSION:    "4.3.2"
  JAVA_VERSION:     "25"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK & CMake
        run: |
          yes | sdkmanager \
            "cmake;${{ env.CMAKE_VERSION }}" \
            "ndk;${{ env.NDK_VERSION }}"
          echo "CMAKE_HOME=$ANDROID_SDK_ROOT/cmake/${{ env.CMAKE_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"  >> $GITHUB_ENV

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache NDK build output
        uses: actions/cache@v4
        with:
          path: Backrooms/.cxx
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-${{ hashFiles('**/CMakeLists.txt','**/Core.cpp') }}
          restore-keys: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-

      - name: Generate gradle.properties
        run: |
          cat <<EOF > gradle.properties
          org.gradle.jvmargs=-Xmx6g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configuration-cache=true
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          sdk.dir=$ANDROID_SDK_ROOT
          cmake.dir=$ANDROID_SDK_ROOT/cmake/${{ env.CMAKE_VERSION }}
          ndk.dir=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          EOF

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper \
            --gradle-version ${{ env.GRADLE_VERSION }} \
            --distribution-type bin
          chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew :Backrooms:assembleRelease \
            --no-daemon \
            --configuration-cache \
            --build-cache \
            --parallel
        env:
          SIGNING_KEY_STORE:      ${{ secrets.SIGNING_KEY_STORE }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name:            Omni_Craft-release-${{ github.sha }}
          path:            Backrooms/build/outputs/apk/release/*.apk
          retention-days:  30

      - name: Upload Native Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name:            Omni_Craft-symbols-${{ github.sha }}
          path:            Backrooms/build/outputs/native-debug-symbols/**
          retention-days:  14
