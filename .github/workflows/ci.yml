name: Omni_Craft Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GRADLE_VERSION:   "9.5.1"
  NDK_VERSION:      "29.0.14206865"
  CMAKE_VERSION:    "4.3.2"
  JAVA_VERSION:     "25"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK via sdkmanager
        run: |
          yes | sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install CMake ${{ env.CMAKE_VERSION }} from cmake.org
        run: |
          CMAKE_URL="https://github.com/Kitware/CMake/releases/download/v${{ env.CMAKE_VERSION }}/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64.tar.gz"
          curl -fsSL "$CMAKE_URL" -o cmake.tar.gz
          sudo tar -xzf cmake.tar.gz -C /opt
          CMAKE_DIR="/opt/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64"
          echo "CMAKE_HOME=$CMAKE_DIR" >> $GITHUB_ENV
          echo "$CMAKE_DIR/bin"        >> $GITHUB_PATH
          cmake --version

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache NDK build output
        uses: actions/cache@v4
        with:
          path: Minecraft/.cxx
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-${{ hashFiles('**/CMakeLists.txt','**/Core.cpp') }}
          restore-keys: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-

      - name: Generate gradle.properties
        run: |
          CMAKE_DIR="/opt/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64"
          {
            echo "org.gradle.jvmargs=-Xmx6g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m"
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
            echo "org.gradle.configuration-cache=true"
            echo "android.useAndroidX=true"
            echo "android.nonTransitiveRClass=true"
            echo "sdk.dir=$ANDROID_SDK_ROOT"
            echo "cmake.dir=$CMAKE_DIR"
            echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          } > gradle.properties

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper \
            --gradle-version ${{ env.GRADLE_VERSION }} \
            --distribution-type bin
          chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew :Minecraft:assembleRelease \
            --no-daemon \
            --configuration-cache \
            --build-cache \
            --parallel
        env:
          SIGNING_KEY_STORE:      ${{ secrets.SIGNING_KEY_STORE }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name:           Omni_Craft-release-${{ github.sha }}
          path:           Minecraft/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Native Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name:           Omni_Craft-symbols-${{ github.sha }}
          path:           Minecraft/build/outputs/native-debug-symbols/**
          retention-days: 14
